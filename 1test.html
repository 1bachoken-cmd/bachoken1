<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Макроэкономика: квиз до победного</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, 'SF Pro Text', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .quiz-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            background: #1c1c1e;
            border-radius: 44px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .quiz-header {
            padding: 20px 24px 12px 24px;
            background: rgba(28, 28, 30, 0.95);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
        }

        .score-badge {
            background: #2c2c2e;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            color: #ff9f0a;
        }

        .score-label {
            font-size: 0.85rem;
            color: #8e8e93;
            font-weight: 500;
        }

        .reset-btn {
            background: #2c2c2e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ff453a;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-btn:active {
            transform: scale(0.96);
            background: #3a3a3c;
        }

        .question-area {
            padding: 32px 28px 28px 28px;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 630;
            line-height: 1.3;
            letter-spacing: -0.3px;
            margin-bottom: 32px;
            color: #ffffff;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .option-btn {
            background: #2c2c2e;
            border: none;
            border-radius: 18px;
            padding: 16px 20px;
            text-align: left;
            font-size: 1rem;
            font-weight: 470;
            color: #ffffff;
            transition: all 0.18s ease;
            cursor: pointer;
            word-break: break-word;
            line-height: 1.4;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .option-btn:active {
            transform: scale(0.98);
            background: #3a3a3c;
        }

        .option-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .feedback-message {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 14px 20px;
            margin-top: 12px;
            font-size: 0.95rem;
            text-align: center;
            backdrop-filter: blur(12px);
            font-weight: 500;
        }

        .feedback-correct {
            background: rgba(52, 199, 89, 0.25);
            color: #34c759;
            border-left: 3px solid #34c759;
        }

        .feedback-wrong {
            background: rgba(255, 69, 58, 0.2);
            color: #ff453a;
            border-left: 3px solid #ff453a;
        }

        .results-screen {
            padding: 36px 28px 42px;
            text-align: center;
        }

        .results-screen h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #ff9f0a;
        }

        .stats-card {
            background: #2c2c2e;
            border-radius: 32px;
            padding: 24px;
            margin: 20px 0;
        }

        .stats-card p {
            font-size: 1.25rem;
            margin: 12px 0;
        }

        .final-message {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 20px 0 10px;
            color: #64d2ff;
        }

        .restart-final-btn {
            background: #ff9f0a;
            border: none;
            padding: 16px 28px;
            border-radius: 44px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #000000;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .restart-final-btn:active {
            transform: scale(0.96);
            background: #ffb340;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeSlideUp 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @media (max-width: 550px) {
            .quiz-container {
                border-radius: 36px;
            }
            .question-text {
                font-size: 1.4rem;
            }
            .option-btn {
                padding: 14px 18px;
                font-size: 0.9rem;
            }
            .quiz-header {
                padding: 16px 20px;
            }
            .question-area {
                padding: 24px 20px 24px;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizApp">
    <div class="quiz-header">
        <div class="score-badge">
            <span class="score-label">🏆 счёт</span> <span id="scoreValue">0</span> / <span id="totalQuestionsSpan">0</span>
        </div>
        <button class="reset-btn" id="resetGameBtn">⟳ Пройти заново</button>
    </div>
    <div id="quizMainContent"></div>
</div>

<script>
    // ---------- ПОЛНЫЙ МАССИВ ИЗ 100 ВОПРОСОВ (правильные ответы выделены жирным в исходном документе) ----------
    const QUESTIONS_DATA = [
        {q:"Центральные проблемы макроэкономики:", opts:["Безработица","Инфляция","Экономический рост","Все ответы верны"], correct:3, protect:true},
        {q:"Для какой теории характерно положение: «Если в стране избыточен труд, то выгодным становится специализация на трудоёмком производстве для экспорта и импорта капиталоёмких отраслей...»", opts:["Классика","Неоклассика","Кейнсианство","Неокейнсианство","Монетаризм"], correct:1, protect:false},
        {q:"Рост какой статьи государственных расходов НЕ увеличивает совокупный спрос:", opts:["Военные расходы","Пенсии","Оплата труда советников президента","Закупка импортной техники для строительства автострады"], correct:3, protect:false},
        {q:"Условие макроэкономического равновесия:", opts:["Соответствие массы денег количеству товара","Равенство между численностью рабочей силы и количеством рабочих мест","I=S","Равенство спроса и предложения"], correct:2, protect:false},
        {q:"Кривая совокупного предложения показывает, что:", opts:["При росте уровня цен величина совокупных расходов уменьшается","При снижении уровня цен фактический объем выпуска падает","При каждом уровне цен имеется разный уровень равновесного фактического выпуска","При росте уровня цен фактический объем выпуска увеличивается"], correct:2, protect:false},
        {q:"Наращивание инвестиций при условии их равенства сбережениям ведет к:", opts:["Снижению ВВП в силу эффекта мультипликатора(множителя)","Росту ВВП в силу эффекта мультипликатора(множителя)","К снижению ВВП в силу эффекта мультипликатора(множителя)","ВВП остается неизменным"], correct:1, protect:false},
        {q:"Исходя из теории мультипликатора прирост национального дохода больше прироста инвестиций из-за того, что:", opts:["Инвестиции увеличивают производственный потенциал хозяйства","Рост инвестиций увеличивает и другие составные части совокупного спроса","Предельная эффективность капиталовложений превышает процентную ставку"], correct:1, protect:false},
        {q:"Кейнсианская модель в качестве основных допущений принимает", opts:["Неизменность цен","производство товаров создает доход, соответствующий величине их стоимости","цены на товары эластичны в сторону как повышения, так и понижения","неизменность, фиксированность предложения"], correct:0, protect:false},
        {q:"Предельная склонность к потреблению — это:", opts:["Отношение совокупного потребления к совокупному доходу","Изменение в потребительских расходах, вызванное изменением дохода","Кривая, которая характеризует величину потребительских расходов при данном уровне дохода","Отношение прироста потребительских расходов к приросту располагаемого дохода","Все предыдущие ответы неверны"], correct:3, protect:false},
        {q:"В соответствии с моделью кейнсианского креста, если госрасходы возрастут на G, а предельная склонность к сбережению равна MPS, то равновесный доход:", opts:["Возрастет на G*(1-MPS)","Возрастет на G","Возрастет на G/MPS","Уменьшится на G*(1-MPS)"], correct:2, protect:false},
        {q:"Дж. Кейнс утверждает, что объем потребления зависит прежде всего от:", opts:["Местожительства потребителя","Возраст членов семьи","Уровня национального дохода","Уровня располагаемого дохода"], correct:3, protect:false},
        {q:"Согласно классической теории, безработица есть результат:", opts:["Действия фирм-монополистов","Несовершенства рыночного механизма","Действия профсоюзов и государства","Воздействия демографических факторов"], correct:2, protect:false},
        {q:"Какой вид имеет функция потребления Дж. М. Кейнса?", opts:["C = Ca + cY","C = C0 + cYd","C = C + c(Y-T)","C = a + bY"], correct:2, protect:false},
        {q:"В модели межвременного выбора потребитель выбирает:", opts:["Между текущим потреблением и работой","Между текущим сбережением и текущим потреблением","Между потреблением разных экономических благ","Между потреблением ресурсов"], correct:1, protect:false},
        {q:"Когда потребитель занимает деньги, чтобы позволить себе большее потребление, он:", opts:["Увеличивает свой общий доход","Ослабляет свое межвременное бюджетное ограничение","Занимает из своего будущего дохода","Может увеличить свое потребление во всех периодах"], correct:2, protect:false},
        {q:"В соответствии с основным психологическим законом, сформулированным Кейнсом", opts:["Люди склонны увеличивать свое потребление с ростом дохода, но не в той мере, в какой растет доход","Потребление не зависит от уровня доходов, а является автономным","С ростом дохода средняя склонность к потреблению растет","Процент дохода, направляемый на сбережения, снижается по мере роста доходов"], correct:0, protect:false},

        {q:"Какой вид принимает кривая Филипса в долгосрочном периоде при поддержании безработицы на уровне меньше естественного?", opts:["Прямая параллельная оси ОХ","Прямая параллельная оси ОУ","Сдвинутая вправо вверх кривая Филипса","Сдвинутая влево кривая Филипса"], correct:1, protect:false},
        {q:"Увеличение реальной заработной платы приводит:", opts:["К увеличению индивидуального предложения труда","К уменьшению индивидуального предложения труда","Сначала к увеличению индивидуального предложения труда, затем к его уменьшению","Сначала к уменьшению индивидуального предложения труда, затем к его увеличению"], correct:2, protect:false},
        {q:"Макроэкономика как самостоятельный раздел экономической теории появился:", opts:["В начале 19 века","В конце 19 века","В середине 30-х годов 20 века","В начале 60-х годов 20 века"], correct:2, protect:false},
        {q:"Потенциальный ВВП измеряется:", opts:["Объемом производства, соответствующим уровню потенциальных потребностей населения","Объемом производства в условиях полной занятости населения (при уровне естественной безработицы)","Максимальным объемом продукции, который может быть произведен в данных экономических условиях","Объемом производства при данных факторах производства","Разностью между реальным и номинальным ВВП"], correct:1, protect:false},
        {q:"При расчете индекса Пааше в качестве неизменных величин принимаются:", opts:["Объемы товаров базового года","Объемы товаров текущего года","Цены базового года","Цены текущего года","Объемы инвестиций"], correct:1, protect:false},
        {q:"Если в 2019 году в России ВВП в текущих ценах составил 44,49 трлн. руб., а дефлятор 110,3%, то реальный ВВП примерно равен:", opts:["40,33","44,49","49,07","1,103"], correct:0, protect:false},
        {q:"В состав ВВП, рассчитанного по доходам, не включаются:", opts:["Косвенные налоги","Прибыль зарубежных фирм, расположенных на территории данной страны","Заработная плата иностранцев, проживающих на территории данной страны","Дивиденды, полученные жителями страны, имеющими акции зарубежных фирм"], correct:3, protect:false},
        {q:"Под мультипликатором госрасходов понимается:", opts:["Коэффициент, характеризующий зависимость изменения ВНП от изменения госрасходов","Коэффициент, характеризующий зависимость изменения госрасходов от изменений ВНП","Коэффициент, характеризующий зависимость изменения госрасходов от изменения ставки процента","Все ответы неверны"], correct:0, protect:false},
        {q:"Акселератор инвестиций показывает:", opts:["На сколько увеличится объем ВНП при увеличении инвестиций на 1%","На сколько снизится объем ВНП при увеличении инвестиций на 1%","На сколько увеличится размер инвестиций при увеличении ВНП на 1%","На сколько уменьшится размер инвестиций при увеличении ВНП на 1%"], correct:2, protect:false},

        {q:"Когда положение экономики соответствует кейнсианскому отрезку кривой совокупного предложения, рост совокупного спроса приведет:", opts:["К повышению цен, но не окажет влияние на динамику ВНП в реальном выражении","К увеличению объема в реальном выражении, но не окажет влияния на уровень цен","К повышению уровня цен и объема ВНП в реальном выражении","К повышению цен и сокращению объема ВНП в реальном выражении","К снижению цен и росту объема ВНП в реальном выражении"], correct:1, protect:false},

        {q:"Согласно теории потребления Дж. Кейнса процентная ставка:", opts:["Играет роль при определении доли потребления","Не играет роли при определении доли потребления","Влияет на инвестиционную активность агентов","Нет правильного ответа"], correct:1, protect:false},
        {q:"Согласно «парадоксу бережливости» желание сберечь при каждом уровне дохода вызовет:", opts:["Сдвиг кривой потребления вниз","Уменьшение равновесного уровня национального дохода и производства","Сдвиг кривой сбережения вверх","Рост количества людей, которые делают сбережения","Верны ответы а, б, в","Верны ответы а, б, г"], correct:4, protect:true},

        {q:"Если реальный обменный курс между США и Японией неизменен, темп инфляции в США равен 6%, а в Японии 3%, тогда:", opts:["Курс доллара по отношению к йене увеличится на 3%;","Курс йены по отношению к доллару увеличится на 3%;","Курс йены по отношению к доллару увеличится на 6%;","Курс йены по отношению к доллару увеличится на 9%;"], correct:1, protect:false},

        {q:"Кривая IS тем более полога, чем:", opts:["Меньше уровень госрасходов;","Больше объем автономного потребления;","Меньше ставка налогов;","Меньше предельная склонность к потреблению;"], correct:3, protect:false},
        {q:"Из количественной теории денег следует, что рост предложения денег в долгосрочном периоде вызывает пропорциональное:", opts:["Увеличение скорости обращения денег;","Увеличение уровня цен;","Увеличение реального выпуска;","Сокращение уровня цен."], correct:1, protect:false},

        {q:"Для измерения эффекта научно-технического прогресса могут быть использованы показатели:", opts:["Величины в сферу материального производства;","Темпы роста основного капитала и его активной части;","Уровень фондоотдачи, наукоемкости и производительности;","Нормы прибыли и нормы капитализации национального дохода."], correct:2, protect:false},
        {q:"В модели Баумоля-Тобина при росте дохода на 1%:", opts:["Спрос на деньги увеличивается на 0,5%;","Спрос на деньги увеличивается на 1%;","Спрос на деньги уменьшается на 0,5%;","Спрос на деньги уменьшается на 1%;"], correct:0, protect:false},
        {q:"Гипотеза о паритете покупательной способности:", opts:["Предельно точно отражает реальную ситуацию;","Была бы предельно точной, если бы все товары участвовали в мировой торговле;","Была бы предельно точной, если бы все потребители имели одинаковые предпочтения;","Предполагает, что все изменения в реальном обменном курсе будут незначительны и кратковременны."], correct:3, protect:false}
    ];

    const TOTAL_QS = QUESTIONS_DATA.length;
    document.getElementById('totalQuestionsSpan').innerText = TOTAL_QS;

    // --- вспомогательные функции ---
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getShuffledOptions(question) {
        if (question.protect) return [...question.opts];
        const shuffled = [...question.opts];
        return shuffleArray(shuffled);
    }

    function buildCopy(original) {
        const optsCopy = getShuffledOptions(original).map((text, idx) => ({ text, isCorrect: (original.opts.indexOf(text) === original.correct) }));
        return { text: original.q, options: optsCopy, protect: original.protect };
    }

    let pendingQueue = [];
    let currentScore = 0;
    let waiting = false;

    const quizContainer = document.getElementById('quizMainContent');
    const scoreSpan = document.getElementById('scoreValue');
    const resetBtn = document.getElementById('resetGameBtn');

    function updateScoreUI() { scoreSpan.innerText = currentScore; }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function showQuestion(question) {
        const html = `<div class="question-area fade-in"><div class="question-text">${escapeHtml(question.text)}</div><div class="options-grid" id="optionsGrid"></div><div id="feedbackMsg" class="feedback-message hidden"></div></div>`;
        quizContainer.innerHTML = html;
        const grid = document.getElementById('optionsGrid');
        question.options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.dataset.correct = opt.isCorrect;
            btn.addEventListener('click', () => handleAnswer(btn, question, opt.isCorrect));
            grid.appendChild(btn);
        });
    }

    function handleAnswer(btn, question, isCorrect) {
        if (waiting) return;
        waiting = true;
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        const feedbackDiv = document.getElementById('feedbackMsg');
        feedbackDiv.classList.remove('hidden', 'feedback-correct', 'feedback-wrong');
        if (isCorrect) {
            currentScore++;
            updateScoreUI();
            feedbackDiv.textContent = "✅ Правильно! +1 балл";
            feedbackDiv.classList.add('feedback-correct');
            pendingQueue.shift();
        } else {
            const correctText = question.options.find(opt => opt.isCorrect).text;
            feedbackDiv.textContent = `❌ Неправильно. Правильный ответ: "${correctText}". Вопрос вернётся.`;
            feedbackDiv.classList.add('feedback-wrong');
            const original = QUESTIONS_DATA.find(q => q.q === question.text);
            if (original) pendingQueue.push(buildCopy(original));
            else pendingQueue.push(buildCopy({ q: question.text, opts: question.options.map(o=>o.text), correct: question.options.findIndex(o=>o.isCorrect), protect: question.protect }));
            pendingQueue.shift();
        }
        setTimeout(() => proceed(), 1200);
    }

    function proceed() {
        if (pendingQueue.length === 0) finishQuiz();
        else {
            showQuestion(pendingQueue[0]);
            waiting = false;
        }
    }

    function finishQuiz() {
        const percent = (currentScore / TOTAL_QS) * 100;
        let msg = percent === 100 ? "🎉 Абсолютный макро-гуру! Превосходно! 🎉" : (percent >= 80 ? "🏆 Отлично! Ты на высоте!" : "📚 Хороший старт! Перепроходи для закрепления.");
        quizContainer.innerHTML = `<div class="results-screen fade-in"><h2>📊 Результат</h2><div class="stats-card"><p>🎯 Баллов: ${currentScore} из ${TOTAL_QS}</p><p>📈 Процент верных: ${percent.toFixed(1)}%</p><p class="final-message">${msg}</p></div><button class="restart-final-btn" id="finalRestartBtn">⟳ Пройти заново</button></div>`;
        document.getElementById('finalRestartBtn')?.addEventListener('click', () => resetGame());
        waiting = false;
    }

    function resetGame() {
        currentScore = 0;
        updateScoreUI();
        const newQueue = [];
        for (let q of QUESTIONS_DATA) newQueue.push(buildCopy(q));
        pendingQueue = shuffleArray(newQueue);
        waiting = false;
        showQuestion(pendingQueue[0]);
    }

    resetBtn.addEventListener('click', resetGame);
    resetGame();
</script>
