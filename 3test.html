<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Макроэкономика: квиз (вопросы 201–300)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, 'SF Pro Text', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .quiz-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            background: #1c1c1e;
            border-radius: 44px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .quiz-header {
            padding: 20px 24px 12px 24px;
            background: rgba(28, 28, 30, 0.95);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
        }

        .score-badge {
            background: #2c2c2e;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            color: #ff9f0a;
        }

        .score-label {
            font-size: 0.85rem;
            color: #8e8e93;
            font-weight: 500;
        }

        .reset-btn {
            background: #2c2c2e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ff453a;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-btn:active {
            transform: scale(0.96);
            background: #3a3a3c;
        }

        .question-area {
            padding: 32px 28px 28px 28px;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 630;
            line-height: 1.3;
            letter-spacing: -0.3px;
            margin-bottom: 32px;
            color: #ffffff;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .option-btn {
            background: #2c2c2e;
            border: none;
            border-radius: 18px;
            padding: 16px 20px;
            text-align: left;
            font-size: 1rem;
            font-weight: 470;
            color: #ffffff;
            transition: all 0.18s ease;
            cursor: pointer;
            word-break: break-word;
            line-height: 1.4;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .option-btn:active {
            transform: scale(0.98);
            background: #3a3a3c;
        }

        .option-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .feedback-message {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 14px 20px;
            margin-top: 12px;
            font-size: 0.95rem;
            text-align: center;
            backdrop-filter: blur(12px);
            font-weight: 500;
        }

        .feedback-correct {
            background: rgba(52, 199, 89, 0.25);
            color: #34c759;
            border-left: 3px solid #34c759;
        }

        .feedback-wrong {
            background: rgba(255, 69, 58, 0.2);
            color: #ff453a;
            border-left: 3px solid #ff453a;
        }

        .results-screen {
            padding: 36px 28px 42px;
            text-align: center;
        }

        .results-screen h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #ff9f0a;
        }

        .stats-card {
            background: #2c2c2e;
            border-radius: 32px;
            padding: 24px;
            margin: 20px 0;
        }

        .stats-card p {
            font-size: 1.25rem;
            margin: 12px 0;
        }

        .final-message {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 20px 0 10px;
            color: #64d2ff;
        }

        .restart-final-btn {
            background: #ff9f0a;
            border: none;
            padding: 16px 28px;
            border-radius: 44px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #000000;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .restart-final-btn:active {
            transform: scale(0.96);
            background: #ffb340;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeSlideUp 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @media (max-width: 550px) {
            .quiz-container {
                border-radius: 36px;
            }
            .question-text {
                font-size: 1.4rem;
            }
            .option-btn {
                padding: 14px 18px;
                font-size: 0.9rem;
            }
            .quiz-header {
                padding: 16px 20px;
            }
            .question-area {
                padding: 24px 20px 24px;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizApp">
    <div class="quiz-header">
        <div class="score-badge">
            <span class="score-label">🏆 счёт</span> <span id="scoreValue">0</span> / <span id="totalQuestionsSpan">0</span>
        </div>
        <button class="reset-btn" id="resetGameBtn">⟳ Пройти заново</button>
    </div>
    <div id="quizMainContent"></div>
</div>

<script>
    // ---------- ПОЛНЫЙ МАССИВ ВОПРОСОВ (201–300 из 3test.docx) ----------
    // Правильные ответы выделены жирным в исходном документе.
    // protect: true — не перемешивать варианты (составные ответы, "все ответы верны", "верны а и б" и т.п.)
    const QUESTIONS_DATA = [
        { q: "Если объем номинального ВНП и уровень цен повысится, то:", opts: ["реальный ВНП не изменится;", "реальный ВНП увеличится, но в меньшей степени, чем цены;", "реальный ВНП сократится;", "эта информация не позволяет оценить динамику реального ВНП."], correct: 3, protect: false },
        { q: "Если правительство предполагает снизить уровень реального ВНП, оно может:", opts: ["увеличить налоги;", "снизить госзакупки;", "увеличить трансфертные платежи;", "увеличить бюджетный дефицит;", "верны ответы а) и б)."], correct: 4, protect: true },
        { q: "Трансфертные платежи -- это:", opts: ["выплаты домашним хозяйствам, необусловленные с их стороны предоставлением товаров и услуг;", "только правительственные выплаты отдельным индивидам;", "компонент дохода, который не включается в ВНП;", "все ответы неверны;", "все, перечисленное в пунктах а), б), в)."], correct: 4, protect: true },
        { q: "Какой из указанных ниже доходов или расходов не учитывается при подсчете ВВП:", opts: ["арендная плата за сдачу квартиры;", "покупка облигаций автомобильной компании;", "рост запасов компании;", "заработная плата прислуги."], correct: 1, protect: false },
        { q: "ВВП и ВНП отличаются на величину:", opts: ["стоимости промежуточного продукта;", "стоимости продукта перепродаж;", "трансфертных платежей;", "сальдо факторных доходов;", "сальдо внешней торговли."], correct: 3, protect: false },
        { q: "ВВП не включает:", opts: ["непроизводительные сделки;", "некоторые услуги с условно начисленной стоимостью;", "косвенные налоги;", "вновь введенный физический капитал."], correct: 0, protect: false },
        { q: "Национальный доход -- это:", opts: ["С+ I+ G -- трансфертные платежи+ косвенные налоги;", "инвестиция -- сбережения;", "стоимость предметов длительного пользования и услуг;", "личный доход+ индивидуальные налоги -- чистые субсидии госпредприятиям;", "рента, зарплата, % на капитал, доходы от собственности и прибыль корпораций."], correct: 4, protect: false },
        { q: "Личный (персональный) доход -- это:", opts: ["стоимость произведенных за год товаров и услуг;", "доход, полученный домохозяйствами в течение года;", "весь доход, предназначенный для личных расходов после уплаты налогов;", "сумма сбережений из частных источников, находящихся в стране;", "ВНП минус амортизация."], correct: 1, protect: false },
        { q: "Личный располагаемый доход домашних хозяйств отличается от их персонального дохода на величину:", opts: ["доходов населения, полученных из-за границы;", "амортизации;", "подоходного налога;"], correct: 2, protect: false },
        { q: "Система национальных счетов представляет собой:", opts: ["систему взаимосвязанных показателей;", "международный стандарт оценки основных макроэкономических показателей;", "все ресурсы страны;", "все ответы не верны."], correct: 1, protect: false },
        { q: "Какова главная характеристика качества жизни?", opts: ["высокий доход;", "комфортабельное жилье;", "хорошая работа;", "безопасность и социальная защищенность."], correct: 3, protect: false },
        { q: "Какая характеристика не свойственна деньгам:", opts: ["абсолютно ликвидное средство;", "всеобщий эквивалент;", "средство платежа;", "инструмент бартера."], correct: 3, protect: false },
        { q: "Возникновение кредитных денег связано с функцией денег как:", opts: ["меры стоимости;", "средства обращения", "средства платежа;", "средства накопления;", "мировых денег."], correct: 2, protect: false },
        { q: "Самым ликвидным из всех денежных агрегатов является агрегат:", opts: ["М0;", "М1;", "М2;", "М3."], correct: 0, protect: false },
        { q: "На величину спекулятивного спроса на деньги оказывает влияние:", opts: ["уровень цен на товары и услуги;", "темпы экономического роста;", "процентная ставка;", "величина валового внутреннего продукта."], correct: 2, protect: false },
        { q: "Кто предъявляет спрос на общий объем кредитных средств?", opts: ["потребители;", "государство;", "инвесторы;", "верно б) и в)."], correct: 3, protect: true },
        { q: "Предложение денег возрастет, если:", opts: ["увеличатся госрасходы;", "ЦБ покупает облигации госзайма у населения;", "граждане покупают облигации, выпущенные «Газпромом»;", "IBM продает акции населению и использует деньги для строительства новой фабрики."], correct: 1, protect: false },
        { q: "Какая из перечисленных операций сократит количество денег в обращении?", opts: ["ЦБ снижает ставку рефинансирования, по которой он предоставляет ссуды коммерческим банкам;", "ЦБ покупает государственные облигации у населения и банков;", "ЦБ повышает ставку рефинансирования, по которой он предоставляет ссуды коммерческим банкам;", "ЦБ уменьшает норму обязательных резервов."], correct: 2, protect: false },
        { q: "Денежный мультипликатор:", opts: ["соответствует процентной ставке;", "зависит от нормы обязательных банковских резервов;", "равен обратной величине учетной ставки;", "зависит от спроса на деньги."], correct: 1, protect: false },
        { q: "В соответствии с моделью Баумоля-Тобина средняя сумма наличных денег, которые индивид будет держать на руках, возрастет, если:", opts: ["уменьшатся издержки на походы в банк;", "возрастет темп инфляции;", "упадет процентная ставка;", "уменьшаться расходы индивида."], correct: 2, protect: false },
        { q: "Инструменты денежно-кредитной политики:", opts: ["операции на открытом рынке;", "дисконтная политика;", "изменение уровня банковских резервов;", "верны ответы а) и б);", "все ответы верны."], correct: 4, protect: true },
        { q: "Какова цена спроса на капитальный товар, если от его применения ожидается доход в размере 300 тыс. руб. в первый год, 400 тыс. -- во второй год и 500 тыс. -- в третий год при реальных (с учетом дефлятора) 6% годовых?", opts: ["465,82 тыс. руб.;", "642,3 тыс. руб.;", "1060,3 тыс. руб.;", "1220 тыс. руб."], correct: 2, protect: false },
        { q: "Первичными субъектами предложения капитала являются:", opts: ["домохозяйства, предлагающие свои сбережения своим институтам;", "сбережения физических и юридических лиц;", "непрерывные перетекания сбережений из одного финансового института в другой;", "все ответы неверны."], correct: 0, protect: false },
        { q: "Структуру финансового рынка составляют:", opts: ["денежный рынок и рынок ценных бумаг;", "рынок товаров и услуг;", "рынок капитала;", "национальные и мировой рынки."], correct: 0, protect: false },
        { q: "Если Центральный банк продает государственные ценные бумаги коммерческим банкам, то:", opts: ["увеличивается предложение денег в экономике;", "уменьшается ставка рефинансирования;", "увеличиваются кредиты коммерческих банков;", "уменьшается количество денег в экономике;"], correct: 3, protect: false },
        { q: "Номинальная стоимость акции -- 1 тыс. руб., объявленный дивиденд -- 50%, банковский процент -- 160%. Определить ориентировочную стоимость акции:", opts: ["3,2 тыс. руб.;", "800 руб.;", "312,5 руб.;", "200 руб."], correct: 2, protect: false },
        { q: "Банк предлагает 150% годовых. Каков должен быть первоначальный вклад, чтобы через 3 года иметь на счете 1 млн руб.:", opts: ["70 тыс. руб.;", "64 тыс. руб.;", "100 тыс. руб.;", "900 тыс. руб."], correct: 1, protect: false },
        { q: "Какова ставка дивиденда, если доход на акцию номинальной стоимости 1 тыс. руб. составит 5 тыс. руб. за год?", opts: ["20%;", "500%;", "25%;", "400%."], correct: 1, protect: false },
        { q: "Если государство установит минимальную заработную плату на конкурентном рынке труда, превышающую равновесную, то:", opts: ["возникает дефицит рабочей силы в отрасли;", "возникает избыток рабочей силы в отрасли;", "спрос на труд увеличится;", "предложение труда сократится."], correct: 1, protect: false },
        { q: "Согласно закону Оукена, 2% превышение фактического уровня безработицы над его естественным уровнем означает, что отставание фактического объема ВНП от потенциального составляет:", opts: ["2,5%;", "3%;", "4%;", "5%;", "значительно больше, чем 5%."], correct: 3, protect: false },
        { q: "Какая модель не является моделью макроэкономического равновесия?", opts: ["модель простого воспроизводства Ф. Кенэ;", "модель простого и расширенного воспроизводства К. Маркса;", "модель общего равновесия Л. Вальраса;", "модель краткосрочного экономического равновесия Д. Кейнса;", "паутинообразная модель;", "модель равновесной расширяющей экономики Д. Неймана."], correct: 4, protect: false },
        { q: "Экономический цикл характеризуется:", opts: ["периодичностью повторения неравномерного экономического развития;", "неизменностью экономических показателей;", "неустойчивостью экономических процессов;", "изменением характеристик экономического роста."], correct: 0, protect: false },
        { q: "Фазе традиционного экономического кризиса НЕ соответствует:", opts: ["сокращение производства;", "сокращение капитальных вложений;", "сокращение налоговых поступлений;", "рост рыночных цен."], correct: 3, protect: false },
        { q: "Инфляция -- это:", opts: ["дефицит денег;", "нарушение баланса между товарной и денежной массой;", "процесс укрепления национальной денежной единицы;", "превышение стоимости товарной массы денежной массы."], correct: 1, protect: false },
        { q: "Открытая инфляция проявляется в форме:", opts: ["улучшения качественных характеристик продукции;", "товарного дефицита;", "инфляции спроса и издержек;", "превышения товарной массы над денежной."], correct: 2, protect: false },
        { q: "Подавленная инфляция находит свое проявление в:", opts: ["росте цен;", "товарном дефиците;", "снижении издержек;", "господстве несовершенных форм конкуренции."], correct: 1, protect: false },
        { q: "Какая инфляция наиболее опасна для экономики:", opts: ["открытая, ожидаемая, сбалансированная;", "открытая, ожидаемая, несбалансированная;", "открытая, ожидаемая, сбалансированная;", "подавленная, ожидаемая, сбалансированная."], correct: 1, protect: false },
        { q: "Какая инфляция наиболее опасна для экономики?", opts: ["ожидаемая, несбалансированная;", "ожидаемая, сбалансированная;", "неожидаемая, сбалансированная;", "неожидаемая, несбалансированная", "неверны все перечисленные ответы."], correct: 3, protect: false },
        { q: "Инфляция, вызываемая бюджетно-кредитной экспансией, имеет место, когда:", opts: ["Центральный банк повышает учетные ставки;", "понижаются налоговые ставки;", "Центральный банк понижает учетные ставки;", "бюджетные расходы покрываются за счет денежной эмиссии."], correct: 3, protect: false },
        { q: "Укажите группы типов инфляции по мере усиления инфляционного процесса:", opts: ["галопирующая, ползучая гиперинфляция;", "галопирующая, ползучая стагфляция;", "галопирующая, умеренная гиперинфляция;", "галопирующая, умеренная стагфляция."], correct: 2, protect: false },
        { q: "В случае инфляции спроса при прочих равных:", opts: ["темпы инфляции и уровень безработицы растут;", "уровень безработицы растет, но темпы инфляции падают;", "темп инфляции растет, но уровень безработицы падает;", "темп инфляции растет, уровень безработицы не меняется."], correct: 2, protect: false },
        { q: "К какому типу инфляции приводит рост госрасходов на военные нужды?", opts: ["несбалансированная инфляция;", "галопирующая инфляция;", "инфляция спроса;", "инфляция предложения."], correct: 2, protect: false },
        { q: "Инфляция издержек развивается при:", opts: ["умеренном росте объемов денежной массы;", "росте цен на природные ресурсы;", "росте цен на потребительские товары и услуги;", "снижении учетной ставки."], correct: 1, protect: false },
        { q: "Какой тип инфляции вызывает сокращение налогов на личные доходы?", opts: ["инфляция спроса;", "инфляция предложения;", "несбалансированная инфляция;", "галопирующая инфляция;", "стагфляция."], correct: 0, protect: false },

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getShuffledOptions(question) {
        if (question.protect) return [...question.opts];
        const shuffled = [...question.opts];
        return shuffleArray(shuffled);
    }

    function buildCopy(original) {
        const optsCopy = getShuffledOptions(original).map((text, idx) => ({ text, isCorrect: (idx === original.correct) }));

    }

        quizContainer.innerHTML = html;
        const grid = document.getElementById('optionsGrid');
        question.options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.dataset.correct = opt.isCorrect;
            btn.addEventListener('click', () => handleAnswer(btn, question, opt.isCorrect));
            grid.appendChild(btn);
        });
    }

    function handleAnswer(btn, question, isCorrect) {
        if (waiting) return;
        waiting = true;
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        const feedbackDiv = document.getElementById('feedbackMsg');
        feedbackDiv.classList.remove('hidden', 'feedback-correct', 'feedback-wrong');
        if (isCorrect) {
            currentScore++;
            updateScoreUI();
            feedbackDiv.textContent = "✅ Правильно! +1 балл";
            feedbackDiv.classList.add('feedback-correct');
            pendingQueue.shift();
        } else {
            const correctText = question.options.find(opt => opt.isCorrect).text;
            feedbackDiv.textContent = `❌ Неправильно. Правильный ответ: "${correctText}". Вопрос вернётся.`;
            feedbackDiv.classList.add('feedback-wrong');
            const original = QUESTIONS_DATA.find(q => q.q === question.text);
            if (original) pendingQueue.push(buildCopy(original));
            else pendingQueue.push(buildCopy({ q: question.text, opts: question.options.map(o=>o.text), correct: question.options.findIndex(o=>o.isCorrect), protect: question.protect }));
            pendingQueue.shift();
        }
        setTimeout(() => proceed(), 1200);
    }

    function proceed() {
        if (pendingQueue.length === 0) finishQuiz();
        else {
            showQuestion(pendingQueue[0]);
            waiting = false;
        }
    }

    function finishQuiz() {
        const percent = (currentScore / TOTAL_QS) * 100;
        let msg = percent === 100 ? "🎉 Абсолютный макро-гуру! Превосходно! 🎉" : (percent >= 80 ? "🏆 Отлично! Ты на высоте!" : "📚 Хороший старт! Перепроходи для закрепления.");
        quizContainer.innerHTML = `<div class="results-screen fade-in"><h2>📊 Результат</h2><div class="stats-card"><p>🎯 Баллов: ${currentScore} из ${TOTAL_QS}</p><p>📈 Процент верных: ${percent.toFixed(1)}%</p><p class="final-message">${msg}</p></div><button class="restart-final-btn" id="finalRestartBtn">⟳ Пройти заново</button></div>`;
        document.getElementById('finalRestartBtn')?.addEventListener('click', () => resetGame());
        waiting = false;
    }

    function resetGame() {
        currentScore = 0;
        updateScoreUI();
        const newQueue = [];
        for (let q of QUESTIONS_DATA) newQueue.push(buildCopy(q));
        pendingQueue = shuffleArray(newQueue);
        waiting = false;
        showQuestion(pendingQueue[0]);
    }

    resetBtn.addEventListener('click', resetGame);
    resetGame();
</script>
</body>
</html>
